services:
  db:
    image: postgres:17-alpine
    container_name: cendresvapeur-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cendres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cendres}
      POSTGRES_DB: ${POSTGRES_DB:-cendres_vapeur}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cendres} -d ${POSTGRES_DB:-cendres_vapeur}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  api:
    build: .
    container_name: cendresvapeur-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads: