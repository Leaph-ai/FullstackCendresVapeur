services:
  db:
    image: postgres:17-alpine
    container_name: cendresvapeur-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cendres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cendres}
      POSTGRES_DB: ${POSTGRES_DB:-cendres_vapeur}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cendres} -d ${POSTGRES_DB:-cendres_vapeur}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  api:
    build: .
    container_name: cendresvapeur-api
    restart: unless-stopped
    # Service opt-in : ne démarre qu'avec `--profile full`.
    # En dev backend on lance fastapi en local (hot reload) ; seul `db`
    # démarre par défaut, donc le port 8000 reste libre.
    profiles:
      - full
    env_file:
      - .env
    environment:
      # Inside the container, reach Postgres via the compose service name,
      # not the host's localhost:5432 (which is the .env default for host runs).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cendres}:${POSTGRES_PASSWORD:-cendres}@db:5432/${POSTGRES_DB:-cendres_vapeur}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads: