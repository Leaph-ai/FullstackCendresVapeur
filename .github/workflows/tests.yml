name: Verification du Code (Front & Back)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------
  # 1. TEST DU FRONTEND (React + TypeScript)
  # ----------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    # Indique à GitHub que tout se passe dans le dossier frontend
    defaults:
      run:
        working-directory: ./frontend 

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Version récente et stable de Node.js

      - name: Installer les dépendances (npm)
        run: npm install

      - name: Vérifier que TypeScript compile bien (Build)
        run: npm run build

      - name: Lancer les tests React
        run: npm test

  # ----------------------------------------
  # 2. TEST DU BACKEND (Python + FastAPI)
  # ----------------------------------------
  test-backend:
    runs-on: ubuntu-latest
    # Indique à GitHub que tout se passe dans le dossier backend
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' 
      - name: Installer les dépendances (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Si vous utilisez un outil de test comme pytest, installez-le ici s'il n'est pas dans le requirements.txt :
          # pip install pytest

      - name: Lancer les tests FastAPI
        run: pytest

