name: Verification du Code (Front & Back)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------
  # 1. TESTS E2E DU FRONTEND (Playwright) — front + back + Postgres
  # ----------------------------------------
  test-frontend:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cendres
          POSTGRES_PASSWORD: cendres
          POSTGRES_DB: cendres_vapeur
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cendres -d cendres_vapeur"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://cendres:cendres@localhost:5432/cendres_vapeur
      APP_ENV: dev
      JWT_SECRET: ci-secret-change-me-please-32bytes!
      ALLOWED_ORIGINS: http://localhost:5173
      E2E_API_BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer uv (Python 3.14)
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'

      - name: Installer le client PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Appliquer le schéma et les données de seed
        working-directory: ./backend
        env:
          PGPASSWORD: cendres
        run: |
          psql -h localhost -U cendres -d cendres_vapeur -v ON_ERROR_STOP=1 -f db/schema.sql
          psql -h localhost -U cendres -d cendres_vapeur -v ON_ERROR_STOP=1 -f db/seed.sql

      - name: Installer les dépendances backend
        working-directory: ./backend
        run: uv sync

      - name: Démarrer l'API backend
        working-directory: ./backend
        run: |
          uv run fastapi run app/main.py --port 8000 &
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:8000/products/?limit=1" > /dev/null; then
              echo "API prête."
              exit 0
            fi
            sleep 2
          done
          echo "L'API n'a pas démarré à temps." && exit 1

      - name: Installer les dépendances frontend
        working-directory: ./frontend
        run: npm install

      - name: Vérifier que TypeScript compile bien (Build)
        working-directory: ./frontend
        run: npm run build

      - name: Installer les navigateurs Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests end-to-end (Playwright)
        working-directory: ./frontend
        run: npm test

      - name: Archiver le rapport Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ----------------------------------------
  # 2. TEST DU BACKEND (Python + FastAPI)
  # ----------------------------------------
  test-backend:
    runs-on: ubuntu-latest
    # Indique à GitHub que tout se passe dans le dossier backend
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Installer les dépendances (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Si vous utilisez un outil de test comme pytest, installez-le ici s'il n'est pas dans le requirements.txt :
          # pip install pytest

      - name: Lancer les tests FastAPI
        run: pytest
